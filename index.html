<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Jokes Daily</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🃏 Bad Jokes Daily</h1>
        <div id="joke-card" class="joke-card">
            <p id="setup" class="setup"></p>
            <p id="punchline" class="punchline hidden"></p>
        </div>
        <button id="dark-mode-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        <hr style="margin: 1rem 0; border: none; border-top: 1px solid #e5e7eb;">
        <button id="reveal-btn" onclick="revealPunchline()">Show Punchline</button>
        <button id="next-btn" onclick="nextJoke()">Next Joke</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
